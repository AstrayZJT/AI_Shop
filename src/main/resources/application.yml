spring:
  application:
    name: minimal-agent-springboot
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:agentdemo}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  session:
    jdbc:
      initialize-schema: always

server:
  port: 8080
  servlet:
    session:
      cookie:
        same-site: lax

langchain4j:
  open-ai:
    chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${OPENAI_API_KEY:}
      model-name: qwen-plus
      log-requests: true
      log-responses: true
    embedding-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${OPENAI_API_KEY:}
      model-name: text-embedding-v4

agent:
  search:
    max-results: ${AGENT_SEARCH_MAX_RESULTS:5}
  webpage:
    max-characters: ${AGENT_WEBPAGE_MAX_CHARACTERS:8000}

assistant:
  context:
    max-characters: ${ASSISTANT_CONTEXT_MAX_CHARACTERS:8000}
    max-current-message-characters: ${ASSISTANT_CONTEXT_MAX_CURRENT_MESSAGE_CHARACTERS:4000}
    max-summary-characters: ${ASSISTANT_CONTEXT_MAX_SUMMARY_CHARACTERS:1200}
    max-recent-messages: ${ASSISTANT_CONTEXT_MAX_RECENT_MESSAGES:6}
    max-message-characters: ${ASSISTANT_CONTEXT_MAX_MESSAGE_CHARACTERS:800}
    max-order-facts: ${ASSISTANT_CONTEXT_MAX_ORDER_FACTS:3}
  state:
    input-ttl: ${ASSISTANT_STATE_INPUT_TTL:30m}
    confirmation-ttl: ${ASSISTANT_STATE_CONFIRMATION_TTL:10m}

rag:
  knowledge-path: knowledge
  chunk-size: ${RAG_CHUNK_SIZE:500}
  chunk-overlap: ${RAG_CHUNK_OVERLAP:80}
  candidate-multiplier: ${RAG_CANDIDATE_MULTIPLIER:4}
  min-vector-score: ${RAG_MIN_VECTOR_SCORE:0.78}
  min-final-score: ${RAG_MIN_FINAL_SCORE:0.62}
  max-context-characters: ${RAG_MAX_CONTEXT_CHARACTERS:6000}
  pgvector:
    host: ${RAG_PGVECTOR_HOST:${DB_HOST:localhost}}
    port: ${RAG_PGVECTOR_PORT:${DB_PORT:5432}}
    database: ${RAG_PGVECTOR_DATABASE:${DB_NAME:agentdemo}}
    username: ${RAG_PGVECTOR_USERNAME:${DB_USERNAME:postgres}}
    password: ${RAG_PGVECTOR_PASSWORD:${DB_PASSWORD:}}
    table: ${RAG_PGVECTOR_TABLE:knowledge_embeddings}

shop:
  ai:
    enabled: ${SHOP_AI_ENABLED:true}
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api-key: ${OPENAI_API_KEY:}
    model-name: qwen-plus
    embedding-model-name: text-embedding-v4
    log-requests: true
    log-responses: true
    timeout: ${SHOP_AI_TIMEOUT:30s}
    max-retries: ${SHOP_AI_MAX_RETRIES:1}
    planner-max-output-tokens: ${SHOP_AI_PLANNER_MAX_OUTPUT_TOKENS:1800}
    planner-temperature: ${SHOP_AI_PLANNER_TEMPERATURE:0.0}
  rag:
    top-k: ${AGENT_SEARCH_MAX_RESULTS:5}

app:
  cors:
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
